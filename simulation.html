  for(let i=0;i<pts.length;i++){
    const sx=w2sx(pts[i][0]),sy=w2sy(pts[i][1]);
    const r=Math.max(2,pts[i][2]/vp.w*CW);
    ctx.fillStyle='hsl('+(i*137)%360+',80%,60%)';
    ctx.beginPath();ctx.arc(sx,sy,r,0,Math.PI*2);
    ctx.fill();
    const vx=pts[i][3],vy=pts[i][4];
    const vlen=Math.sqrt(vx*vx+vy*vy);
    if(vlen>0){
      const scale=r*3/vlen;
      const ex=sx+vx*scale,ey=sy-vy*scale;
      ctx.strokeStyle='hsl('+(i*137)%360+',80%,80%)';
      ctx.lineWidth=2;ctx.beginPath();
      ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke();
      const al=6,nx=vx/vlen,ny=-vy/vlen;
      ctx.fillStyle='hsl('+(i*137)%360+',80%,80%)';
      ctx.beginPath();ctx.moveTo(ex,ey);
      ctx.lineTo(ex-al*(nx-ny*0.4),ey-al*(ny+nx*0.4));
      ctx.lineTo(ex-al*(nx+ny*0.4),ey-al*(ny-nx*0.4));
      ctx.closePath();ctx.fill();
    }
    ctx.fillStyle='#fff';ctx.font='10px monospace';
    ctx.fillText((i+1),sx+r+2,sy-r);
  }
  info.textContent='Frame: '+(frame+1)+'/'+frames.length+' | View: ('+vp.ox.toFixed(1)+','+(vp.oy-vp.h).toFixed(1)+') w='+vp.w.toFixed(1);
  slider.value=frame;
}
function advance(){
  if(frame<frames.length-1){frame++;draw();}
  else stopPlay();}
function stepFwd(){
  stopPlay();if(frame<frames.length-1){frame++;draw();}}
function stepBack(){
  stopPlay();if(frame>0){frame--;draw();}}
function stopPlay(){playing=false;if(timer){clearInterval(timer);timer=null;}playBtn.textContent='Play';}
function togglePlay(){
  if(playing){stopPlay();}
  else{playing=true;playBtn.textContent='Pause';timer=setInterval(advance,interval);}}
let dragging=false,lastX=0,lastY=0;
canvas.addEventListener('mousedown',e=>{
  dragging=true;lastX=e.clientX;lastY=e.clientY;});
canvas.addEventListener('mousemove',e=>{
  if(!dragging)return;
  const dx=(e.clientX-lastX)/CW*vp.w;
  const dy=(e.clientY-lastY)/CH*vp.h;
  vp.ox-=dx;vp.oy+=dy;
  lastX=e.clientX;lastY=e.clientY;draw();});
canvas.addEventListener('mouseup',()=>dragging=false);
canvas.addEventListener('mouseleave',()=>dragging=false);
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)/CW;
  const my=(e.clientY-rect.top)/CH;
  const wx=vp.ox+mx*vp.w;
  const wy=vp.oy-my*vp.h;
  const factor=e.deltaY>0?1.15:1/1.15;
  vp.w*=factor;vp.h*=factor;
  vp.ox=wx-mx*vp.w;vp.oy=wy+my*vp.h;
  draw();},{passive:false});
document.addEventListener('keydown',e=>{
  if(e.key===' ')togglePlay();
  else if(e.key==='ArrowRight')stepFwd();
  else if(e.key==='ArrowLeft')stepBack();
  else if(e.key==='f')fitAll();
});
fitAll();
</script>
</body></html>
